kind = "web"
previewPath = "/"
title = "Pass Timer"
version = "1.0.0"
id = "artifacts/pass-timer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20745

[services.development]
run = "pnpm --filter @workspace/pass-timer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pass-timer", "run", "build" ]
publicDir = "artifacts/pass-timer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20745"
BASE_PATH = "/"
